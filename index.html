<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeah, very 1337</title>
    <link rel="stylesheet" href="style.css">
    <script src="./progressGenerator.js" defer></script>
</head>
<body>
    <fieldset style="width: 200px;">
        <legend>My 1337 form.</legend>
        <div class="form_group">
            <label for="main_progress">Progress bar: </label>
            <progress id="main_progress" max="100" aria-label="Progress bar"></progress>
        </div>
        <div class="form_group">
            <label for="color_picker">Color picker: </label>
            <input id="color_picker" type="color" aria-label="Color picker">
        </div>
        <div class="form_group">
            <label for="speed_picker">Speed: </label>
            <input id="speed_picker" type="text" list="speed_list">
        </div>
    </fieldset>

    <!-- DATALISTS -->
    <datalist id="speed_list">
        <option value="10">
        <option value="100">
        <option value="250">
        <option value="500">
        <option value="1000">
        <option value="2500">
    </datalist>
</body>
</html>
